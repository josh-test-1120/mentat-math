<div class="main">
    <h1>Schedule Quizzes</h1>
    <form action="http://localhost:8080/api/schedule" method="post">
        <label for="testDate">Test Date:</label>
            <input type="date" id="testDate" name="testDate"><br><br>
        <label>Exam:
            <select name="Exam">
                <option value="1">Exam 1</option>
                <option value="2">Exam 2</option>
                <option value="3">Exam 3</option>
            </select>
        </label>
        <br><br>
            <input type="submit" value="Schedule Test">
    </form>
</div>
