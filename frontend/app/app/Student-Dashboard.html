<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mentats Team's EZMath Project Student Dashboard" />
    <title>EZMath Student Dashboard</title>
    <!--THE STYLE SHOULD BE CHANGED-->
    <!--
    <link rel="stylesheet" href="globals.css" />
    -->

    <style>
        body {
            font-family: sans-serif, "Lato";
            background: #404040;
            color: #dab05a;
        }

        .sidenav {
            height: 100%;
            width: 160px;
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            background-color: rgb(171,0,50);
            overflow-x: hidden;
        }

        .sidenav a {
            padding: 6px 8px 6px 16px;
            margin-top: 15px;
            text-decoration: none;
            font-size: 20px;
            color: #AFAFAF;
            display: block;
        }
        #logout {
            margin-top: 195px;
        }

        .sidenav a:hover {
            color: #FFC000;
        }

        .main {
            margin-left: 160px; /* Same as the width of the sidenav */
            font-size: 28px; /* Increased text to enable scrolling */
            padding: 0px 10px;
        }

        @media screen and (max-height: 450px) {
            .sidenav {padding-top: 15px;}
            .sidenav a {font-size: 18px;}
        }
        #logo {
            height: 18%;
            width: 93%;
        }
        #currentDate {
            position: absolute;
            left: 500px;
            top: -10px;
            font-size: 1rem;
        }
        #totalScheduled {
            color: #dc3d5d;
        }
    </style>
</head>
<body>
    <main>
        <div class="sidenav">
            <img src="https://www.cwu.edu/about/media-resources/brand/_images/cwu-athletics-logo.png" id="logo" alt="CWU Logo">

            <a href="#home">Home</a>
            <a href="#testScores">See Test Scores & Requirements</a>
            <a href="#scheduleQuiz">Schedule Quiz</a>
            <a href="#about">About</a>
            <a href="#profile">Profile</a>
            <a href="#settings">Settings</a>

            <a href="#logout" id="logout">Log Out</a>

        </div>

        <div class="main">
            <p id="currentDate"><b>Today: May 12th, 2024</b></p>
            <h2>Welcome to EZMath Quiz Scheduler!</h2>
            <p>Current Course: MATH330</p>
            <p>Hello, Student Telmen!</p>
            <p>You have <i id="totalScheduled">0</i> tests scheduled for now, let's go schedule!</p>
        </div>
    </main>
</body>
</html>
